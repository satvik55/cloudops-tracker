# Quick-start compose file using pre-built images from Docker Hub.
# Use this if you just want to run the app without building from source:
#   docker compose -f docker-compose.hub.yml up -d

services:
  app:
    image: satvik55/cloudops-tracker-app:latest
    ports:
      - "80:80"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: satvik55/cloudops-tracker-mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cloudops_tracker
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped
